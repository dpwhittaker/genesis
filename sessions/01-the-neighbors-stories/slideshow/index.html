<!DOCTYPE html>
<!--
  The Neighbors' Stories — slideshow (for the TV).

  A plain slide deck of the session's slides (rendered from the NotebookLM PDF).
  Navigate with the on-screen arrows, the keyboard, or a swipe on mobile
  (swipe LEFT = back, swipe RIGHT = forward). The CURRENT SLIDE is mirrored
  between devices via /sync, so you can drive it from your phone and it shows on
  the TV. No front matter, so Jekyll copies this verbatim.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>The Neighbors' Stories — Slideshow</title>
<link rel="stylesheet" href="slideshow.css">
</head>
<body>
<div id="app">
  <img id="slide" alt="slide">

  <button id="prev" class="nav nav-prev" aria-label="Back">&#8249;</button>
  <button id="next" class="nav nav-next" aria-label="Forward">&#8250;</button>

  <div id="bar">
    <span id="link" class="link" title="Linked — driving the screen">&#9679;</span>
    <span id="counter">1 / 1</span>
    <button id="full" class="btn" title="Fullscreen" aria-label="Fullscreen">&#9974;</button>
  </div>
</div>

<script src="slideshow.js"></script>
</body>
</html>
